                  sflow sample 16384
                  sflow vrf MGMT destination 127.0.0.1 6343
                  sflow vrf MGMT source-interface Management1
                  sflow run
                featureSupport: {}
                name: sflow
                regexes:
                  - .*
                reloadDelays: {}
                tcamProfile: null
                tridentForwardingTablePartition: null
        tags:
          query: Campus-Pod:BUILDING_A AND NOT Role:Member-Leaf
      - inputs:
          platformSettingsGroup:
            customPlatformSettings:
              - eosCli: |-
                  sflow sample 16384
                  sflow destination 127.0.0.1 6343
                  sflow source-interface Vlan900
