---
type: spine

# Spine Switches
spine:
  defaults:
    platform: 7050CX3-32S
    
    spanning_tree_mode: mstp
    spanning_tree_priority: 4096
    loopback_ipv4_pool: 10.10.1.0/24
    # mlag_peer_ipv4_pool: 10.250.1.0/31
    # mlag_peer_l3_ipv4_pool: 10.251.1.0/31
    # mlag_interfaces: [Ethernet31/1, Ethernet32/1]

  node_groups:
    - group: BA_SPINES
      bgp_as: 65000

      nodes:
        - name: BA-Spine1
          id: 1
          mgmt_ip: 172.100.36.11/24
          rack: RACK1
          serial_number: BASPINE1
          system_mac_address: 00:1c:11:11:ba:01

        - name: BA-Spine2
          id: 2
          mgmt_ip: 172.100.36.12/24
          rack: RACK2
          serial_number: BASPINE2
          system_mac_address: 00:1c:11:11:ba:02

l3_edge:
  p2p_links_profiles:
    - name: DCI_profile
      as: [65000, 65331]
      include_in_underlay_protocol: true
      speed: forced 100gfull
  p2p_links:
    - id: 1
      nodes: [BA-Spine1, BA-Router1]
      interfaces: [Ethernet32/1, Ethernet49/1]
      profile: DCI_profile
      ip: [192.168.1.0/31, 192.168.1.1/31]
    - id: 2
      nodes: [BA-Spine2, BA-Router1]
      interfaces: [Ethernet32/1, Ethernet50/1]
      profile: DCI_profile
      ip: [192.168.1.2/31, 192.168.1.3/31]
